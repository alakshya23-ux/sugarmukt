<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Now | Sugarmukt</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    :root {
        --primary: #004836;
        --primary-light: #028665;
        --accent: #b6e154;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        font-family: 'Poppins', sans-serif; 
        background: linear-gradient(135deg, #f8fffa 0%, #e8f5e9 100%);
        min-height: 100vh;
        padding: 40px 20px;
    }
    h1,h2 { font-family: 'Playfair Display', serif; }
    
    .order-section { max-width: 600px; margin: 0 auto; }
    .order-card { 
        background: #fff; 
        padding: 50px 40px; 
        border-radius: 30px; 
        box-shadow: 0 20px 80px rgba(0,72,54,0.12);
        border: 1px solid rgba(182,225,84,0.2);
    }
    .order-card h2 { 
        margin-bottom: 30px; 
        color: var(--primary); 
        font-size: 32px;
        text-align: center;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        color: var(--primary);
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 14px;
    }
    .order-card input, .order-card select { 
        width: 100%; 
        padding: 15px 20px; 
        border: 2px solid #e0e0e0; 
        border-radius: 12px;
        font-family: 'Poppins';
        transition: 0.3s;
        font-size: 15px;
    }
    .order-card input:focus, .order-card select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(182,225,84,0.1);
        outline: none;
    }
    .qty-box { 
        display: flex; 
        align-items: center; 
        gap: 15px;
        background: #f8fffa;
        padding: 15px;
        border-radius: 12px;
    }
    .qty-box button { 
        width: 45px; height: 45px;
        border: none; 
        background: linear-gradient(135deg, var(--primary), var(--primary-light));
        color: white; 
        border-radius: 12px; 
        cursor: pointer;
        font-size: 20px;
        font-weight: 600;
        transition: 0.3s;
    }
    .qty-box button:hover {
        transform: scale(1.1);
        box-shadow: 0 5px 15px rgba(0,72,54,0.3);
    }
    .qty-box input { 
        width: 80px; 
        text-align: center;
        font-size: 18px;
        font-weight: 600;
        color: var(--primary);
    }
    .order-btn { 
        background: linear-gradient(135deg, var(--primary), var(--primary-light));
        color: #fff; 
        padding: 18px; 
        border: none; 
        width: 100%; 
        border-radius: 50px; 
        font-size: 18px; 
        cursor: pointer;
        font-weight: 700;
        margin-top: 10px;
        transition: 0.3s;
    }
    .order-btn:hover { 
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(0,72,54,0.4);
    }
    .back-link {
        text-align: center;
        margin-top: 20px;
    }
    .back-link a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
    }
    .badge-trust {
        background: linear-gradient(135deg, #d4edda, #c3e6cb);
        color: #155724;
        padding: 12px 20px;
        border-radius: 50px;
        text-align: center;
        margin-bottom: 30px;
        font-weight: 600;
    }
</style>
</head>
<body>

<div class="order-section">
    <div class="order-card">
        <div class="badge-trust">
            <i class="fas fa-shield-alt"></i> 100% Secure | COD Available
        </div>
        <h2><i class="fas fa-shopping-cart"></i> Place Your Order</h2>

        <div class="form-group">
            <label><i class="fas fa-user"></i> Full Name *</label>
            <input type="text" id="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-phone"></i> Mobile Number *</label>
            <input type="tel" id="phone" placeholder="10-digit mobile number" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-leaf"></i> Select Product *</label>
            <select id="product" required>
                <option value="">Choose your medicine</option>
                <option value="Sugarmukt Powder" data-price="599">Sugarmukt Powder - ₹599</option>
                <option value="Sugarmukt Capsules" data-price="699">Sugarmukt Capsules - ₹699</option>
            </select>
        </div>

        <div class="form-group">
            <label><i class="fas fa-box"></i> Quantity *</label>
            <div class="qty-box">
                <button type="button" onclick="decreaseQty()"><i class="fas fa-minus"></i></button>
                <input type="number" id="quantity" value="1" min="1" max="3" readonly>
                <button type="button" onclick="increaseQty()"><i class="fas fa-plus"></i></button>
                <span style="margin-left:auto; color:var(--primary); font-weight:600;">Max: 3</span>
            </div>
        </div>

        <div class="form-group">
            <label><i class="fas fa-home"></i> House / Flat No *</label>
            <input type="text" id="house" placeholder="House number, Building name" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-map-marker-alt"></i> Area / Landmark *</label>
            <input type="text" id="area" placeholder="Street, Area, Landmark" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-city"></i> City *</label>
            <input type="text" id="city" placeholder="Your city" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-map"></i> District *</label>
            <input type="text" id="district" placeholder="Your district" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-flag"></i> State *</label>
            <input type="text" id="state" placeholder="Your state" required>
        </div>

        <div class="form-group">
            <label><i class="fas fa-mail-bulk"></i> Postal Code *</label>
            <input type="text" id="pincode" placeholder="6-digit pincode" required>
        </div>

        <button class="order-btn" onclick="placeOrder()">
            <i class="fas fa-arrow-right"></i> Proceed to Payment
        </button>
        
        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>
</div>

<script>
function increaseQty() {
    let qty = document.getElementById("quantity");
    if (parseInt(qty.value) < 3) qty.value = parseInt(qty.value) + 1;
}

function decreaseQty() {
    let qty = document.getElementById("quantity");
    if(qty.value > 1) qty.value = parseInt(qty.value) - 1;
}

function placeOrder() {
    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let productSelect = document.getElementById("product");
    let product = productSelect.value;
    let price = productSelect.options[productSelect.selectedIndex].getAttribute('data-price');
    let quantity = parseInt(document.getElementById("quantity").value);
    
    let house = document.getElementById("house").value.trim();
    let area = document.getElementById("area").value.trim();
    let city = document.getElementById("city").value.trim();
    let district = document.getElementById("district").value.trim();
    let state = document.getElementById("state").value.trim();
    let pincode = document.getElementById("pincode").value.trim();

    if(!name || !phone || !product || !house || !area || !city || !district || !state || !pincode){
        alert("⚠️ Please fill all required fields!");
        return;
    }
    
    if(quantity > 3){
        alert("⚠️ Maximum 3 items allowed!");
        return;
    }
    
    if(!/^\d{10}$/.test(phone)){
        alert("⚠️ Please enter valid 10-digit mobile number!");
        return;
    }
    
    if(!/^\d{6}$/.test(pincode)){
        alert("⚠️ Please enter valid 6-digit pincode!");
        return;
    }

    let subtotal = parseInt(price) * quantity;
    let shipping = 49;
    let total = subtotal + shipping;

    const orderData = {
        orderId: 'SUGAR' + Date.now(),
        name, phone, product, price, quantity,
        house, area, city, district, state, pincode,
        subtotal, shipping, total,
        paymentStatus: 'pending'
    };
    
    localStorage.setItem('sugarmukt_order', JSON.stringify(orderData));
    window.location.href = "payment.html";  
}
</script>

</body>
</html>
