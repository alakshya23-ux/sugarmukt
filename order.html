<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Now | Sugarmukt</title>

<link rel="stylesheet" href="css/bootstrap.min.css">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f7f6;
}
.order-section {
    padding: 60px 0;
}
.order-card {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
.order-card h2 {
    margin-bottom: 20px;
    color: #2d6a4f;
}
.order-card input, .order-card select {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

/* Quantity buttons */
.qty-box {
    display: flex;
    align-items: center;
    gap: 10px;
}
.qty-box button {
    padding: 8px 15px;
    border: none;
    background: #2d6a4f;
    color: white;
    border-radius: 5px;
}
.qty-box input {
    width: 60px;
    text-align: center;
}

.order-btn {
    background: #2d6a4f;
    color: #fff;
    padding: 12px;
    border: none;
    width: 100%;
    border-radius: 8px;
    font-size: 16px;
}
.order-btn:hover {
    background: #1b4332;
}
</style>
</head>

<body>

<div class="container order-section">
<div class="row justify-content-center">
<div class="col-lg-6">

<div class="order-card">

<h2>🛒 Place Your Order</h2>

<!-- CUSTOMER INFO -->
<input type="text" id="name" placeholder="Full Name *" required>
<input type="tel" id="phone" placeholder="Mobile Number *" required>

<!-- PRODUCT -->
<select id="product" required>
<option value="">Select Product *</option>
<option value="Sugarmukt Powder">Sugarmukt Powder</option>
<option value="Sugarmukt Capsules">Sugarmukt Capsules</option>
</select>

<!-- QUANTITY -->
<div class="qty-box">
<button onclick="decreaseQty()">-</button>
<input type="number" id="quantity" value="1" min="1" required>
<button onclick="increaseQty()">+</button>
</div>

<br>

<!-- ADDRESS -->
<input type="text" id="house" placeholder="House / Flat No *" required>
<input type="text" id="area" placeholder="Area / Building / Landmark *" required>
<input type="text" id="city" placeholder="City *" required>
<input type="text" id="district" placeholder="District *" required>
<input type="text" id="state" placeholder="State *" required>
<input type="text" id="pincode" placeholder="Postal Code *" required>

<!-- BUTTON -->
<button class="order-btn" onclick="placeOrder()">Place Order</button>

</div>
</div>
</div>
</div>

<script>

// quantity controls
function increaseQty() {
    let qty = document.getElementById("quantity");
    qty.value = parseInt(qty.value) + 1;
}

function decreaseQty() {
    let qty = document.getElementById("quantity");
    if(qty.value > 1) {
        qty.value = parseInt(qty.value) - 1;
    }
}

// validation + order
function placeOrder() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let product = document.getElementById("product").value;
    let quantity = document.getElementById("quantity").value;

    let house = document.getElementById("house").value;
    let area = document.getElementById("area").value;
    let city = document.getElementById("city").value;
    let district = document.getElementById("district").value;
    let state = document.getElementById("state").value;
    let pincode = document.getElementById("pincode").value;

    if(!name || !phone || !product || !house || !area || !city || !district || !state || !pincode){
        alert("Please fill all required fields!");
        return;
    }

    alert("Order placed successfully! We will contact you soon.");
}

</script>

</body>
</html>
